<div id="particles-js">
    <div class="header">
        <h1>
            <span class="site-title">{{site.user_name}}</span>
            <span class="site-description">{{site.user_title}}</span>
        </h1>
        <div class="header-icons">
            <a title="Email" aria-label="Send me an email" href="mailto:{{site.email}}"><i class="icon fa fa-envelope"></i></a>
            <a title="Resume" aria-label="My Resume" target="_blank" href="{{ "assets/resume.pdf" | prepend: site.baseurl }}"><i class="icon fa fa-file" aria-hidden="true"></i></a>
            <a title="Linkedin" aria-label="My Linkedin" target="_blank" href="{{ "https://www.linkedin.com/in/" | append: site.linkedin_username }}"><i class="icon fa fa-linkedin" aria-hidden="true"></i></a>
            <a title="Github" aria-label="My Github" target="_blank" href="{{ "https://github.com/" | append: site.github_username }}"><i class="icon fa fa-github-alt" aria-hidden="true"></i></a>
        </div>
    
        <div class="header-links">
            <a class="link" href="{{site.baseurl}}/collection/">My Collection of Stuff & Things</a>
        </div>
    </div>
    <a class="down" href="#about" data-scroll><i class="icon fa fa-chevron-down" aria-hidden="true"></i></a>
</div>
